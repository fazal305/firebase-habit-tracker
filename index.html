<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Firebase Habit Tracker</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="habit-styles.css">
</head>
<body>

    <div id="app-root"></div>

    <div class="modal fade" id="habit-modal" tabindex="-1" aria-labelledby="habit-modal-title" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content habit-modal-content">
                <div class="modal-header">
                    <h2 class="modal-title fs-5" id="habit-modal-title">Add Habit</h2>

                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>

                <form id="habit-form">
                    <div class="modal-body">
                        <input type="hidden" id="habit-id">

                        <div class="mb-3">
                            <label for="habit-name" class="form-label">Habit Name</label>
                            <input type="text" class="form-control" id="habit-name" placeholder="Example: Drink water">
                            <div class="form-error" id="habit-name-error"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Choose Emoji</label>

                            <div class="emoji-picker">
                                <button type="button" class="emoji-option active" data-emoji="💧">💧</button>
                                <button type="button" class="emoji-option" data-emoji="🏃">🏃</button>
                                <button type="button" class="emoji-option" data-emoji="📚">📚</button>
                                <button type="button" class="emoji-option" data-emoji="🧘">🧘</button>
                                <button type="button" class="emoji-option" data-emoji="🥗">🥗</button>
                                <button type="button" class="emoji-option" data-emoji="🌙">🌙</button>
                            </div>

                            <input type="hidden" id="habit-emoji" value="💧">
                        </div>

                        <div class="mb-3">
                            <label for="habit-frequency" class="form-label">Frequency</label>

                            <select class="form-select" id="habit-frequency">
                                <option value="daily">Daily</option>
                                <option value="weekdays">Weekdays Only</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="habit-color" class="form-label">Color Label</label>

                            <select class="form-select" id="habit-color">
                                <option value="#00f5ff">Neon Cyan</option>
                                <option value="#00ff88">Success Green</option>
                                <option value="#f5a623">Amber</option>
                                <option value="#ff3860">Danger Red</option>
                                <option value="#9b5cff">Neon Purple</option>
                            </select>
                        </div>

                        <div class="form-error" id="habit-form-error"></div>
                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-neon" id="save-habit-btn">Save Habit</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="habit-auth.js"></script>
    <script src="habit-db.js"></script>
    <script src="habit-app.js"></script>
</body>
</html>
